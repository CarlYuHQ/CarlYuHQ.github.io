<div class="ac-datetime" data-ac-time aria-label="Current date and time">
  <div class="ac-date">
    <span class="ac-weekday" data-ac-weekday>Sunday</span>
    <span class="ac-monthday" data-ac-monthday>Jan 1</span>
  </div>
  <div class="ac-time" aria-live="polite">
    <span data-ac-hour>00</span><span class="ac-colon" aria-hidden="true">:</span><span data-ac-min>00</span>
  </div>
</div>
